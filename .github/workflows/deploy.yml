name: Validate Tattant

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Build client
        run: npm --prefix client run build
        env:
          VITE_API_URL: /api

      - name: Deployment note
        run: |
          echo "Render deploys production from render.yaml."
          echo "AWS/EC2 deployment is intentionally disabled."
