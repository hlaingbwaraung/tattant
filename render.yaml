databases:
  - name: tattant-db
    plan: free
    databaseName: tattant
    user: tattant_user

services:
  - type: web
    plan: free
    name: tattant-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npx sequelize-cli db:migrate
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tattant-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://tattant.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
